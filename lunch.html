<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>餐廳隨機輪盤 - 修正版</title>
    <style>
        body {
            font-family: 'Microsoft JhengHei', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }

        h2 { color: #2c3e50; margin-bottom: 20px; }

        #wheel-container {
            position: relative;
            width: 350px;
            height: 350px;
        }

        #wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
        }

        /* 指針修正為實心三角形 */
        #pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 30px solid #e74c3c;
            z-index: 10;
        }

        .controls { margin-top: 40px; text-align: center; }

        button {
            padding: 12px 40px;
            font-size: 18px;
            cursor: pointer;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 0 #2980b9;
        }

        button:active { transform: translateY(2px); box-shadow: 0 2px 0 #2980b9; }
        button:disabled { background-color: #bdc3c7; box-shadow: none; cursor: not-allowed; }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #e67e22;
            height: 30px;
        }
    </style>
</head>
<body>

    <h2>🍴 今天吃什麼？</h2>
    
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="400" height="400"></canvas>
    </div>

    <div class="controls">
        <button onclick="spin()" id="spinBtn">開始抽獎</button>
        <div id="result"></div>
    </div>

    <script>
        const canvas = document.getElementById('wheel');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resultDiv = document.getElementById('result');

        const list = ["吉野家", "12mini", "好糧", "素食", "八方雲集", "自助餐", "麵食", "7-11", "豆鋪子", "麵包店", "水果"];
        const colors = ["#ffadad", "#ffd6a5", "#fdffb6", "#caffbf", "#9bf6ff", "#a0c4ff", "#bdb2ff", "#ffc6ff", "#ff9aa2", "#b5ead7", "#e2f0cb"];
        
        const numSegments = list.length;
        const segmentAngle = 360 / numSegments;
        let currentRotation = 0;

        // 初始化繪製輪盤
        function draw() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = centerX;

            list.forEach((text, i) => {
                const startAngle = (i * segmentAngle - 90) * Math.PI / 180;
                const endAngle = ((i + 1) * segmentAngle - 90) * Math.PI / 180;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.fillStyle = colors[i % colors.length];
                ctx.fill();
                ctx.stroke();

                // 繪製文字
                ctx.save();
                ctx.translate(centerX, centerY);
                ctx.rotate(startAngle + (segmentAngle / 2 * Math.PI / 180));
                ctx.textAlign = "right";
                ctx.fillStyle = "#333";
                ctx.font = "bold 16px sans-serif";
                ctx.fillText(text, radius - 20, 10);
                ctx.restore();
            });
        }

        function spin() {
            spinBtn.disabled = true;
            resultDiv.innerText = "旋轉中...";

            // 隨機增加旋轉角度 (5-10圈 + 隨機角度)
            const randomSpin = Math.floor(Math.random() * 360) + 1800; 
            currentRotation += randomSpin;
            
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            // 動態結束後的處理
            setTimeout(() => {
                spinBtn.disabled = false;
                
                // 計算結果：考慮到 CSS 旋轉是順時針，且初始位置已減去 90 度
                const finalAngle = (currentRotation % 360);
                const winningIndex = Math.floor((360 - finalAngle) % 360 / segmentAngle);
                
                resultDiv.innerText = `抽中：${list[winningIndex]}`;
            }, 4000);
        }

        draw();
    </script>
</body>
</html>
